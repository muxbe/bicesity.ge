<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Settings | VeloHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
        }

        .tab-active {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
        }
    </style>
</head>

<body class="flex min-h-screen">
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white"><i
                        class="fas fa-cog"></i></div>
                <span class="font-black text-xl tracking-tight">SELLER HUB</span>
            </div>
            <nav class="space-y-2">
                <a href="admin.html"
                    class="flex items-center gap-4 px-5 py-4 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50">
                    <i class="fas fa-warehouse"></i> Inventory
                </a>
                <a href="schema.html"
                    class="flex items-center gap-4 px-5 py-4 rounded-2xl text-sm font-bold bg-blue-600 text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-sliders-h"></i> Field Settings
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 p-12 max-w-5xl">
        <h1 class="text-4xl font-black text-slate-900 mb-8">Data Architecture</h1>

        <!-- Category Tabs -->
        <div class="flex gap-8 border-b border-slate-200 mb-8">
            <button onclick="switchTab('bicycle')" id="tab-bicycle"
                class="pb-4 font-black text-lg transition-all tab-active uppercase tracking-wider">Bicycle
                Fields</button>
            <button onclick="switchTab('part')" id="tab-part"
                class="pb-4 font-black text-lg text-slate-400 transition-all uppercase tracking-wider">Parts &
                Accessories Fields</button>
        </div>

        <div id="attr-list" class="space-y-4 mb-8"></div>

        <button onclick="openModal()"
            class="w-full py-10 border-4 border-dashed border-slate-200 rounded-[3rem] text-slate-400 flex flex-col items-center justify-center gap-3 hover:border-blue-500 hover:text-blue-500 hover:bg-blue-50/50 transition-all group">
            <div
                class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center group-hover:scale-110 transition-transform">
                <i class="fas fa-plus text-xl"></i>
            </div>
            <span id="btn-text" class="font-black text-lg tracking-tight uppercase">Add Bicycle Field</span>
        </button>
    </main>

    <!-- Modal -->
    <div id="fieldModal"
        class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[3rem] shadow-2xl p-10">
            <h2 class="text-2xl font-black mb-6">New <span id="modal-type">Bicycle</span> Field</h2>
            <div class="space-y-6">
                <input type="text" id="field-name" placeholder="e.g. Battery Voltage"
                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold outline-none">
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                    <span class="font-bold text-slate-600">Public Visibility</span>
                    <input type="checkbox" id="field-public" checked class="w-6 h-6 accent-blue-600">
                </div>
                <div class="flex gap-4">
                    <button onclick="saveField()"
                        class="flex-1 bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl">Create</button>
                    <button onclick="closeModal()"
                        class="px-8 bg-slate-100 text-slate-400 font-bold py-5 rounded-2xl">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'bicycle';
        const getAttrs = () => JSON.parse(localStorage.getItem(`velo_attrs_${currentTab}`) || '[]');

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-bicycle').className = t === 'bicycle' ? 'pb-4 font-black text-lg transition-all tab-active uppercase tracking-wider' : 'pb-4 font-black text-lg text-slate-400 transition-all uppercase tracking-wider';
            document.getElementById('tab-part').className = t === 'part' ? 'pb-4 font-black text-lg transition-all tab-active uppercase tracking-wider' : 'pb-4 font-black text-lg text-slate-400 transition-all uppercase tracking-wider';
            document.getElementById('btn-text').innerText = `Add ${t} Field`;
            render();
        }

        function render() {
            const list = document.getElementById('attr-list');
            const attrs = getAttrs();
            list.innerHTML = attrs.map(a => `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 flex justify-between items-center group">
                    <div class="flex items-center gap-6">
                        <div class="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center ${a.isPublic ? 'text-blue-500' : 'text-amber-500'}">
                            <i class="fas ${a.isPublic ? 'fa-eye' : 'fa-eye-slash'}"></i>
                        </div>
                        <div>
                            <p class="text-lg font-black text-slate-900">${a.name}</p>
                            <span class="text-[10px] font-black uppercase tracking-widest ${a.isPublic ? 'text-blue-500' : 'text-amber-500'}">${a.isPublic ? 'Visible' : 'Internal'}</span>
                        </div>
                    </div>
                    <button onclick="del('${a.id}')" class="text-slate-200 hover:text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function openModal() { document.getElementById('modal-type').innerText = currentTab; document.getElementById('fieldModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('fieldModal').classList.add('hidden'); }

        function saveField() {
            const name = document.getElementById('field-name').value;
            if (!name) return;
            const attrs = getAttrs();
            attrs.push({ id: 'attr_' + Date.now(), name, isPublic: document.getElementById('field-public').checked });
            localStorage.setItem(`velo_attrs_${currentTab}`, JSON.stringify(attrs));
            document.getElementById('field-name').value = '';
            closeModal();
            render();
        }

        function del(id) {
            let attrs = getAttrs();
            attrs = attrs.filter(a => a.id !== id);
            localStorage.setItem(`velo_attrs_${currentTab}`, JSON.stringify(attrs));
            render();
        }

        window.onload = render;
    </script>
</body>

</html>
