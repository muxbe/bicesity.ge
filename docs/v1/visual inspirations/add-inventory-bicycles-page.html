<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Hub | VeloHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f1f5f9;
        }

        .tab-btn {
            transition: all 0.3s;
        }

        .tab-btn-active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>

<body class="flex min-h-screen">
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white"><i
                        class="fas fa-lock"></i></div>
                <span class="font-black text-lg tracking-tight">SELLER HUB</span>
            </div>
            <nav class="space-y-2">
                <a href="admin.html"
                    class="flex items-center gap-3 px-5 py-3 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-lg shadow-blue-200"><i
                        class="fas fa-box"></i> Inventory</a>
                <a href="schema.html"
                    class="flex items-center gap-3 px-5 py-3 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50"><i
                        class="fas fa-stream"></i> Field Settings</a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <div class="flex gap-2 bg-white p-1.5 rounded-3xl border border-slate-200">
                <button onclick="switchInv('bicycle')" id="btn-bicycle"
                    class="px-8 py-3 rounded-2xl font-black text-sm tab-btn tab-btn-active uppercase tracking-widest">Bicycles</button>
                <button onclick="switchInv('part')" id="btn-part"
                    class="px-8 py-3 rounded-2xl font-black text-sm tab-btn text-slate-400 uppercase tracking-widest">Parts
                    & Accessories</button>
            </div>
            <button onclick="openModal()"
                class="bg-slate-900 text-white px-10 py-4 rounded-[1.5rem] font-black shadow-xl hover:bg-blue-600 transition-all flex items-center gap-3">
                <i class="fas fa-plus"></i> Add <span id="add-btn-type">Bicycle</span>
            </button>
        </div>

        <div id="list" class="space-y-6"></div>
    </main>

    <!-- Modal Form -->
    <div id="addModal"
        class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-2xl font-black">Register New <span id="form-type">Bicycle</span></h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-900"><i
                        class="fas fa-times"></i></button>
            </div>

            <form id="productForm" class="p-8 overflow-y-auto space-y-8">
                <div id="bicycle-exclusive" class="hidden">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Drive
                        Type</label>
                    <select name="type"
                        class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 font-bold">
                        <option value="Manual">Manual</option>
                        <option value="Electrical">Electrical</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Item Name</label>
                        <input type="text" name="name" required
                            class="w-full bg-slate-50 border-none rounded-xl px-4 py-4 font-bold shadow-inner">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Serial / Part
                            #</label>
                        <input type="text" name="serial" required
                            class="w-full bg-slate-50 border-none rounded-xl px-4 py-4 font-bold shadow-inner">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Price ($)</label>
                        <input type="number" name="price" required
                            class="w-full bg-slate-50 border-none rounded-xl px-4 py-4 font-bold shadow-inner">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Photo URL</label>
                        <input type="text" name="image"
                            class="w-full bg-slate-50 border-none rounded-xl px-4 py-4 font-bold shadow-inner">
                    </div>
                </div>

                <div class="border-t border-slate-100 pt-6">
                    <h3 class="text-[11px] font-black text-blue-600 uppercase mb-6">Technical Specifications</h3>
                    <div id="dynamic-fields" class="grid grid-cols-2 gap-6"></div>
                </div>
            </form>

            <div class="p-8 bg-slate-50 flex gap-4">
                <button onclick="saveProduct()"
                    class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg">Save to
                    Inventory</button>
                <button onclick="closeModal()"
                    class="px-8 bg-white border border-slate-200 text-slate-500 font-bold py-5 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentInv = 'bicycle';
        const getProducts = () => JSON.parse(localStorage.getItem(`velo_stock_${currentInv}`) || '[]');
        const getAttrs = () => JSON.parse(localStorage.getItem(`velo_attrs_${currentInv}`) || '[]');

        function switchInv(t) {
            currentInv = t;
            document.getElementById('btn-bicycle').className = t === 'bicycle' ? 'px-8 py-3 rounded-2xl font-black text-sm tab-btn tab-btn-active uppercase tracking-widest' : 'px-8 py-3 rounded-2xl font-black text-sm tab-btn text-slate-400 uppercase tracking-widest';
            document.getElementById('btn-part').className = t === 'part' ? 'px-8 py-3 rounded-2xl font-black text-sm tab-btn tab-btn-active uppercase tracking-widest' : 'px-8 py-3 rounded-2xl font-black text-sm tab-btn text-slate-400 uppercase tracking-widest';
            document.getElementById('add-btn-type').innerText = t === 'bicycle' ? 'Bicycle' : 'Part';
            render();
        }

        function render() {
            const list = document.getElementById('list');
            const products = getProducts();
            const attrs = getAttrs();

            if (products.length === 0) {
                list.innerHTML = `<div class="bg-white rounded-[3rem] p-20 text-center border-2 border-dashed border-slate-200 text-slate-300 font-bold">Empty ${currentInv} inventory</div>`;
                return;
            }

            list.innerHTML = products.map(p => `
                <div class="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-sm flex gap-8 items-center">
                    <img src="${p.image}" class="w-24 h-24 object-cover rounded-2xl bg-slate-100 shadow-inner">
                    <div class="flex-1">
                        <div class="flex justify-between mb-4">
                            <div>
                                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md uppercase tracking-tighter">#${p.serial}</span>
                                <h3 class="text-2xl font-black mt-1 text-slate-900">${p.name}</h3>
                            </div>
                            <p class="text-2xl font-black">$${p.price}</p>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            ${attrs.map(a => `<div class="bg-slate-50 p-2 rounded-xl text-[11px] font-bold"><span class="text-slate-400 uppercase text-[8px] block">${a.name}</span>${p.values[a.id] || '-'}</div>`).join('')}
                        </div>
                    </div>
                    <button onclick="del('${p.id}')" class="text-slate-200 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-xl"></i></button>
                </div>
            `).join('');
        }

        function openModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('form-type').innerText = currentInv === 'bicycle' ? 'Bicycle' : 'Part';
            document.getElementById('bicycle-exclusive').classList.toggle('hidden', currentInv !== 'bicycle');

            const container = document.getElementById('dynamic-fields');
            const attrs = getAttrs();
            container.innerHTML = attrs.map(a => `
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">${a.name}</label>
                    <input type="text" data-attr-id="${a.id}" class="w-full bg-slate-50 border-none rounded-xl px-4 py-4 font-bold shadow-inner dyn-input">
                </div>
            `).join('');
        }

        function closeModal() { document.getElementById('addModal').classList.add('hidden'); }

        function saveProduct() {
            const form = document.getElementById('productForm');
            const formData = new FormData(form);
            const products = getProducts();

            const item = {
                id: 'item_' + Date.now(),
                name: formData.get('name'),
                serial: formData.get('serial'),
                price: formData.get('price'),
                image: formData.get('image') || 'https://images.unsplash.com/photo-1532298229144-0ee05051da69?w=400',
                type: formData.get('type'),
                values: {}
            };

            document.querySelectorAll('.dyn-input').forEach(i => {
                item.values[i.getAttribute('data-attr-id')] = i.value;
            });

            products.unshift(item);
            localStorage.setItem(`velo_stock_${currentInv}`, JSON.stringify(products));
            closeModal();
            render();
            form.reset();
        }

        function del(id) {
            let products = getProducts();
            products = products.filter(p => p.id !== id);
            localStorage.setItem(`velo_stock_${currentInv}`, JSON.stringify(products));
            render();
        }

        window.onload = render;
    </script>
</body>

</html>
